name: Beta Distribution

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-libserialport-windows-x64-v1

      - name: Install libserialport via vcpkg
        run: vcpkg install libserialport:x64-windows

      - name: Copy serialport.dll into Flutter windows/ directory
        shell: pwsh
        run: |
          Copy-Item "C:\vcpkg\installed\x64-windows\bin\serialport.dll" `
            "foc-companion\windows\serialport.dll"

      - name: Get Dependencies
        shell: pwsh
        run: |
          cd foc-companion
          flutter pub get

      - name: Build Windows release
        shell: pwsh
        run: |
          cd foc-companion
          flutter build windows --release --build-number=${{ github.run_number }}

      - name: Package Windows build as zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "foc-companion\build\windows\x64\runner\Release\*" `
            -DestinationPath "foc-companion-windows-${{ github.ref_name }}.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: foc-companion-windows
          path: foc-companion-windows-${{ github.ref_name }}.zip

      - name: Add Windows zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: foc-companion-windows-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  distribute:
    name: Build and Distribute APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Dart Protoc Plugin
        run: |
          dart pub global activate protoc_plugin
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Get Dependencies
        run: |
          cd foc-companion
          flutter pub get

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > foc-companion/android/app/google-services.json

      - name: Generate Protobuf
        run: |
          chmod +x ./generate_protos.sh
          ./generate_protos.sh

      - name: Build APK
        run: |
          cd foc-companion
          flutter build apk --release --build-number=${{ github.run_number }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: foc-companion-release-apk
          path: foc-companion/build/app/outputs/flutter-apk/app-release.apk

      - name: Generate Release Notes
        id: release_notes
        run: |
          git fetch --tags --force
          CURRENT_TAG=${{ github.ref_name }}
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | grep -v "^${CURRENT_TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          CHANGES=$(git log --pretty=format:"- %s" "${PREV_TAG}..${CURRENT_TAG}")
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "## What's New" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "---" >> $GITHUB_OUTPUT
          echo "**Full Changelog:** \`${PREV_TAG}\` → \`${CURRENT_TAG}\`" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: ${{ steps.release_notes.outputs.notes }}
          files: foc-companion/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: beta-testers
          file: foc-companion/build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: ${{ steps.release_notes.outputs.notes }}
