name: Beta Distribution

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  distribute:
    name: Build and Distribute APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install Dart Protoc Plugin
        run: |
          dart pub global activate protoc_plugin
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Get Dependencies
        run: |
          cd foc-companion
          flutter pub get

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > foc-companion/android/app/google-services.json

      - name: Generate Protobuf
        run: |
          chmod +x ./generate_protos.sh
          ./generate_protos.sh

      - name: Build APK
        run: |
          cd foc-companion
          flutter build apk --release --build-number=${{ github.run_number }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: foc-companion-release-apk
          path: foc-companion/build/app/outputs/flutter-apk/app-release.apk

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: "Latest Development Build"
          body: |
            This release is automatically updated with the latest build from the `master` branch.
            
            **Last Updated:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
          files: foc-companion/build/app/outputs/flutter-apk/app-release.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: beta-testers
          file: foc-companion/build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            Beta build from ${{ github.sha }}
            Message: ${{ github.event.head_commit.message }}
