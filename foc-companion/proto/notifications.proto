syntax = "proto3";
package focstim_rpc;

import "constants.proto";


message NotificationBoot {
}

message NotificationDeviceVolume {
    float volume = 1;   // (0, 1)
    bool locked = 2;
}

message NotificationButtonPress {
    ButtonState state = 1;
    uint32 timestamp_ms = 2;  // millis() on STM32 (uint32_t, wraps ~49.7 days)
}

message NotificationCurrents {
    float rms_a = 1;                // body current in amps
    float rms_b = 2;
    float rms_c = 3;
    float rms_d = 4;
    float peak_a = 5;               // peak body current in amps
    float peak_b = 6;
    float peak_c = 7;
    float peak_d = 8;
    float output_power = 9;         // output stage power in watts
    float output_power_skin = 10;   // output stage power in watts, only the component delivered to skin
    float peak_cmd = 11;
}

message NotificationModelEstimation {
    float resistance_a = 1;     // estimated output resistance, including output stage
    float reluctance_a = 2;     // at the current carrier frequency
    float resistance_b = 3;
    float reluctance_b = 4;
    float resistance_c = 5;
    float reluctance_c = 6;
    float resistance_d = 7;
    float reluctance_d = 8;
    float constant = 20;        // fixed resistance of the output stage
}

message SystemStatsESC1 {
    float temp_stm32 = 1;
    float temp_board = 2;
    float v_bus = 3;
    float v_ref = 4;
}

message SystemStatsFocstimV3 {
    float temp_stm32 = 1;

    float v_sys_min = 2;
    float v_sys_max = 6;
    float v_ref = 3;
    float v_boost_min = 4;
    float v_boost_max = 7;
    float boost_duty_cycle = 5;
}

message NotificationSystemStats {
    oneof system {
        SystemStatsESC1 esc1 = 1;
        SystemStatsFocstimV3 focstimv3 = 2;
    }
}

message NotificationSignalStats {
    float actual_pulse_frequency = 1;
    float v_drive = 2;                  // maximum peak-to-peak voltage (low side)
    float transformer_utilization = 3;  // 0-1 precentage of transformer saturation
    float voltage_utilization = 4;      // 0-1 percentage of maximum usable voltage
}

message NotificationBattery {
    float battery_voltage = 1;
    float battery_charge_rate_watt = 2;
    float battery_soc = 3;  // int?
    bool wall_power_present = 4;
    float chip_temperature = 5;
}

message NotificationLSM6DSOX {
    sint32 acc_x = 1;   // acceleration, conversion factor depends on full scale selection
    sint32 acc_y = 2;
    sint32 acc_z = 3;
    sint32 gyr_x = 4;   // angular velocity, conversion factor depends on full scale selection
    sint32 gyr_y = 5;
    sint32 gyr_z = 6;
}

message NotificationPressure {
    float pressure = 1;   // Pascal
}

message NotificationDebugString {
    string message = 1;
}

message NotificationDebugAS5311 {
    int32 raw = 1;
    sint32 tracked = 2;
    int32 flags = 3;
}

// only abused for debug within logging in restim
message NotificationDebugEdging {
    float full_power_threshold = 1;
    float reduced_power_threshold = 2;
    float reduction = 3;
}

message NotificationDebugTeleplot {
    string id = 1;
    float value = 2;
}