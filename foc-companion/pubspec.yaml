name: foc_companion
description: "FOC Companion App"
publish_to: 'none'
version: 1.4.6+19

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Communication
  protobuf: ^6.0.0
  fixnum: ^1.1.0

  # Storage
  shared_preferences: ^2.2.2
  file_picker: ^11.0.2
  path_provider: ^2.1.2
  archive: ^4.0.2
  uuid: ^4.5.1
  receive_sharing_intent: ^1.8.1

  # Logging
  logger: ^2.0.0

  # SMB
  dart_smb2: ^0.1.0

  # UI
  share_plus: ^10.1.4
  wakelock_plus: ^1.2.8
  flutter_foreground_task: ^9.2.2
  xml: ^6.6.1

  # Desktop USB/serial transport (Windows, macOS, Linux)
  libserialport: ^0.3.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  path: ^1.9.0

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/images/

  fonts:
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
